# Render.com deployment configuration
# Deploy at: https://render.com

databases:
  - name: keyauth-db
    databaseName: keyauth
    user: keyauth
    plan: free

services:
  - type: web
    name: keyauth-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: keyauth-db
          property: connectionString
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
